# ch-keeper-customer-{1,2}  ←  ch-customer-{1,2}  →  otel-collector-customer-{1,2}  →  Kafka
# ch-keeper-central         ←  ch-central         →  otel-collector-central (sink + keeper scrape)
#                                                         ↑ Kafka → ch-central
#
# ch-keeper-customer-{1,2}: standalone ClickHouse Keeper for each customer cluster
# ch-keeper-central:        standalone ClickHouse Keeper for ch-central
# ch-customer-1/2:          source ClickHouse clusters (monitored), use their respective keeper
# ch-central:               sink ClickHouse cluster (OTel schema), uses ch-keeper-central
# otel-collector-customer-1: scrapes ch-customer-1 + ch-keeper-customer-1 → Kafka
# otel-collector-customer-2: scrapes ch-customer-2 + ch-keeper-customer-2 → Kafka
# otel-collector-central:    Kafka → ch-central (sink); scrapes ch-keeper-central → ch-central
# Grafana:                  reads only from ch-central

services:

  ch-keeper-customer-1:
    image: clickhouse/clickhouse-keeper:latest
    container_name: ch-poc-ch-keeper-customer-1
    ports:
      - "2181:9181"   # ZooKeeper-compatible (host access for debugging)
      - "9365:9363"   # Prometheus metrics
    volumes:
      - ./ch-keeper-customer-1/config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - ch-keeper-customer-1-data:/var/lib/clickhouse-keeper
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 127.0.0.1 9181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 20

  ch-keeper-customer-2:
    image: clickhouse/clickhouse-keeper:latest
    container_name: ch-poc-ch-keeper-customer-2
    ports:
      - "2182:9181"   # ZooKeeper-compatible (host access for debugging)
      - "9366:9363"   # Prometheus metrics
    volumes:
      - ./ch-keeper-customer-2/config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - ch-keeper-customer-2-data:/var/lib/clickhouse-keeper
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 127.0.0.1 9181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 20

  ch-customer-1:
    image: clickhouse/clickhouse-server:latest
    container_name: ch-poc-ch-customer-1
    environment:
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
      - "9363:9363"   # Prometheus metrics
    volumes:
      - ./ch-customer-1/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init-scripts:/docker-entrypoint-initdb.d:ro
      - ch-customer-1-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    depends_on:
      ch-keeper-customer-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  ch-customer-2:
    image: clickhouse/clickhouse-server:latest
    container_name: ch-poc-ch-customer-2
    environment:
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8126:8123"   # HTTP
      - "9003:9000"   # native
      - "9364:9363"   # Prometheus metrics
    volumes:
      - ./ch-customer-2/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init-scripts:/docker-entrypoint-initdb.d:ro
      - ch-customer-2-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    depends_on:
      ch-keeper-customer-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.7.0
    container_name: ch-poc-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector-customer-1:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ch-poc-otel-collector-customer-1
    user: "0:0"
    volumes:
      - ./otel-collector-customer-1-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      ch-customer-1:
        condition: service_healthy
      ch-keeper-customer-1:
        condition: service_healthy
      kafka:
        condition: service_healthy

  otel-collector-customer-2:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ch-poc-otel-collector-customer-2
    user: "0:0"
    volumes:
      - ./otel-collector-customer-2-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      ch-customer-2:
        condition: service_healthy
      ch-keeper-customer-2:
        condition: service_healthy
      kafka:
        condition: service_healthy

  otel-collector-central:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ch-poc-otel-collector-central
    user: "0:0"
    volumes:
      - ./otel-collector-central-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      kafka:
        condition: service_healthy
      ch-central:
        condition: service_healthy

  ch-keeper-central:
    image: clickhouse/clickhouse-keeper:latest
    container_name: ch-poc-ch-keeper-central
    ports:
      - "2183:9181"   # ZooKeeper-compatible (host access for debugging)
      - "9367:9363"   # Prometheus metrics
    volumes:
      - ./ch-keeper-central/config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - ch-keeper-central-data:/var/lib/clickhouse-keeper
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 127.0.0.1 9181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 20

  ch-central:
    image: clickhouse/clickhouse-server:latest
    container_name: ch-poc-ch-central
    environment:
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8124:8123"   # HTTP (different host port)
      - "9001:9000"   # native (different host port)
    volumes:
      - ./ch-central/config.d:/etc/clickhouse-server/config.d:ro
      - ./ch-central/init-scripts:/docker-entrypoint-initdb.d:ro
      - ch-central-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    depends_on:
      ch-keeper-central:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ch-poc-grafana
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      ch-central:
        condition: service_healthy

  loadgen:
    image: clickhouse/clickhouse-server:latest
    container_name: ch-poc-loadgen
    entrypoint:
      - bash
      - -c
      - |
        sleep 20
        while true; do
          clickhouse-client --host ch-customer-1 --password clickhouse --query "SELECT count() FROM numbers(400000) WHERE number % 7 = 0" > /dev/null
          clickhouse-client --host ch-customer-1 --password clickhouse --query "SELECT sleep(0.2)" > /dev/null
          clickhouse-client --host ch-customer-1 --password clickhouse --query "INSERT INTO default.events (session_id, event_type, value) SELECT rand() % 50000, ['click','view','purchase','login','logout'][rand() % 5 + 1], rand() % 10000 / 100.0 FROM numbers(200)" > /dev/null
          sleep 1
        done
    depends_on:
      ch-customer-1:
        condition: service_healthy

  loadgen2:
    image: clickhouse/clickhouse-server:latest
    container_name: ch-poc-loadgen2
    entrypoint:
      - bash
      - -c
      - |
        sleep 20
        while true; do
          clickhouse-client --host ch-customer-2 --password clickhouse --query "SELECT count() FROM numbers(150000) WHERE number % 5 = 0" > /dev/null
          clickhouse-client --host ch-customer-2 --password clickhouse --query "SELECT sleep(0.3)" > /dev/null
          clickhouse-client --host ch-customer-2 --password clickhouse --query "INSERT INTO default.events (session_id, event_type, value) SELECT rand() % 20000, ['click','view','purchase','login','logout'][rand() % 5 + 1], rand() % 10000 / 100.0 FROM numbers(80)" > /dev/null
          sleep 3
        done
    depends_on:
      ch-customer-2:
        condition: service_healthy

volumes:
  ch-keeper-customer-1-data:
  ch-keeper-customer-2-data:
  ch-keeper-central-data:
  ch-customer-1-data:
  ch-customer-2-data:
  ch-central-data:
  grafana-data:
