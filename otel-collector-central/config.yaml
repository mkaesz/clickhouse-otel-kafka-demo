# otel-collector-central-config.yaml
#
# SINK pipelines   — consume from Kafka, write to ch-central OTel schema
#   metrics/sink: kafka: clickhouse-metrics → clickhouse exporter
#   logs/sink:    kafka: clickhouse-logs    → clickhouse exporter

receivers:

  kafka/metrics_in:
    brokers: ["kafka:9092"]
    group_id: otelcol-metrics
    metrics:
      topics: ["clickhouse-metrics"]
      encoding: otlp_json

  kafka/logs_in:
    brokers: ["kafka:9092"]
    group_id: otelcol-logs
    logs:
      topics: ["clickhouse-logs"]
      encoding: otlp_json

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  clickhouse:
    endpoint: tcp://ch-central:9000?dial_timeout=10s
    username: default
    password: clickhouse
    database: otel
    ttl: 72h
    create_schema: false
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  pipelines:
    metrics/sink:
      receivers: [kafka/metrics_in]
      processors: [batch]
      exporters: [clickhouse]

    logs/sink:
      receivers: [kafka/logs_in]
      processors: [batch]
      exporters: [clickhouse]
